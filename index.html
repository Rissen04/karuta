<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>百人一首 4択クイズ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f5f0;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .quiz-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 8px solid #2c5d3b; /* 畳や和をイメージした緑 */
        }
        h1 {
            text-align: center;
            font-size: 24px;
            color: #2c5d3b;
            margin-bottom: 20px;
        }
        .status {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .kami-no-ku {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background-color: #f9f9f5;
            border-radius: 5px;
            border-left: 5px solid #2c5d3b;
        }
        .options-grid {
            display: grid;
            gap: 12px;
        }
        .option-btn {
            background-color: #fff;
            border: 2px solid #e0e0d8;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f0f5f1;
            border-color: #2c5d3b;
        }
        .option-btn:disabled {
            cursor: default;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }
        .wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }
        .result-panel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .next-btn {
            display: block;
            width: 100%;
            background-color: #2c5d3b;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
        .next-btn:hover {
            background-color: #1e4228;
        }
        .score-screen {
            text-align: center;
            padding: 40px 0;
        }
        .score-title {
            font-size: 28px;
            color: #2c5d3b;
            margin-bottom: 20px;
        }
        .score-num {
            font-size: 48px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="game-style">
        <h1>百人一首 4択クイズ</h1>
        <div class="status">
            <span id="question-number">第 1 問 / 全 10 問</span>
            <span id="current-score">スコア: 0</span>
        </div>
        <div class="kami-no-ku" id="kami-no-ku">上の句がここに表示されます</div>
        <div class="options-grid" id="options-container">
            <!-- ボタンがJSで自動生成されます -->
        </div>
        <div class="result-panel" id="result-panel"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="score-style" class="score-screen" style="display: none;">
        <div class="score-title">クイズ終了！</div>
        <div class="score-num" id="final-score">0 / 10</div>
        <button class="next-btn" style="display: block;" onclick="restartGame()">もう一度遊ぶ</button>
    </div>
</div>

    { id: 98, kami: "風そよぐ ならの小川の 夕暮れは", shimo: "みそぎぞ夏の しるしなりける", author: "従二位家隆" },
    { id: 99, kami: "人とも人を 恨みむともなし 世を知らぬ", shimo: "身のうきためにおれると思へば", author: "後鳥羽院" },
    { id: 100, kami: "ももしきや 古き軒端の しのぶにも", shimo: "なほあまりある 昔なりけり", author: "順徳院" }
];

let currentQuizSet = [];
let currentIndex = 0;
let score = 0;
const totalQuestions = 10; // 1回あたりの出題数

function initGame() {
    // 100首からランダムに10首を抽出
    const shuffled = [...hyakuninIsshu].sort(() => 0.5 - Math.random());
    currentQuizSet = shuffled.slice(0, totalQuestions);
    currentIndex = 0;
    score = 0;
    
    document.getElementById('game-style').style.display = 'block';
    document.getElementById('score-style').style.display = 'none';
    showQuestion();
}

function showQuestion() {
    // 画面リセット
    document.getElementById('next-button').style.display = 'none';
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('result-panel').className = 'result-panel';
    
    // 進捗表示
    document.getElementById('question-number').innerText = `第 ${currentIndex + 1} 問 / 全 ${totalQuestions} 問`;
    document.getElementById('current-score').innerText = `スコア: ${score}`;
    
    const currentSong = currentQuizSet[currentIndex];
    document.getElementById('kami-no-ku').innerText = currentSong.kami;
    
    // 4択を作る（正解1つ + 誤答3つ）
    const options = [currentSong.shimo];
    const otherSongs = hyakuninIsshu.filter(song => song.id !== currentSong.id);
    const shuffledOthers = otherSongs.sort(() => 0.5 - Math.random());
    
    for(let i=0; i<3; i++) {
        options.push(shuffledOthers[i].shimo);
    }
    
    // 選択肢の順序をランダムに
    options.sort(() => 0.5 - Math.random());
    
    // ボタンの生成
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    options.forEach(option => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.innerText = option;
        button.onclick = () => selectOption(button, option, currentSong.shimo, currentSong.author);
        container.appendChild(button);
    });
}

function selectOption(selectedButton, selectedValue, correctValue, author) {
    // すべてのボタンを無効化
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    
    const resultPanel = document.getElementById('result-panel');
    resultPanel.style.display = 'block';
    
    if (selectedValue === correctValue) {
        selectedButton.classList.add('correct');
        resultPanel.classList.add('correct');
        resultPanel.innerText = `◯ 正解！【作者】${author}`;
        score++;
        document.getElementById('current-score').innerText = `スコア: ${score}`;
    } else {
        selectedButton.classList.add('wrong');
        resultPanel.classList.add('wrong');
        resultPanel.innerText = `× 不正解... 正解は「${correctValue}」でした。【作者】${author}`;
        
        // 正解のボタンをハイライト
        buttons.forEach(btn => {
            if (btn.innerText === correctValue) {
                btn.classList.add('correct');
            }
        });
    }
    
    document.getElementById('next-button').style.display = 'block';
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < totalQuestions) {
        showQuestion();
    } else {
        showScore();
    }
}

function showScore() {
    document.getElementById('game-style').style.display = 'none';
    document.getElementById('score-style').style.display = 'block';
    document.getElementById('final-score').innerText = `${score} / ${totalQuestions}`;
}

function restartGame() {
    initGame();
}

// 初回起動
window.onload = initGame;
</script>
</body>
</html>
